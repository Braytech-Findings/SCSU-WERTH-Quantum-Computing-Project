<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Different Roads to the Same Circuit</title>
  <desc id="desc">A colorful research banner showing one logical quantum circuit splitting into a line-connected superconducting architecture and an all-to-all trapped-ion architecture.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08152f"/>
      <stop offset="0.52" stop-color="#172a63"/>
      <stop offset="1" stop-color="#391d64"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3de0ff"/>
      <stop offset="1" stop-color="#6ef3c5"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c77dff"/>
      <stop offset="1" stop-color="#ff7ab6"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <circle cx="118" cy="74" r="95" fill="#24d6ff" opacity="0.08"/>
  <circle cx="1090" cy="352" r="135" fill="#ff5bbd" opacity="0.08"/>

  <text x="600" y="62" text-anchor="middle" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="34" font-weight="800">DIFFERENT ROADS TO THE SAME CIRCUIT</text>
  <text x="600" y="94" text-anchor="middle" fill="#cbd8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16">Same logical algorithms · different connectivity · measurable compilation cost</text>

  <!-- logical circuit -->
  <g transform="translate(430 126)">
    <rect width="340" height="112" rx="18" fill="#ffffff" fill-opacity="0.08" stroke="#b9c8ff" stroke-opacity="0.55"/>
    <text x="170" y="25" text-anchor="middle" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700">ONE LOGICAL CIRCUIT</text>
    <g stroke="#a9baff" stroke-width="3">
      <line x1="30" y1="48" x2="310" y2="48"/><line x1="30" y1="79" x2="310" y2="79"/>
    </g>
    <g font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="800" text-anchor="middle">
      <rect x="57" y="34" width="30" height="30" rx="5" fill="#28d7ff"/><text x="72" y="55" fill="#07162c" font-size="15">H</text>
      <circle cx="140" cy="48" r="6" fill="#ffffff"/><line x1="140" y1="48" x2="140" y2="79" stroke="#ffffff" stroke-width="3"/><circle cx="140" cy="79" r="13" fill="none" stroke="#ffffff" stroke-width="3"/><line x1="128" y1="79" x2="152" y2="79" stroke="#ffffff" stroke-width="3"/>
      <rect x="211" y="65" width="31" height="29" rx="5" fill="#d985ff"/><text x="227" y="85" fill="#1d0d31" font-size="14">Rz</text>
    </g>
  </g>

  <!-- split arrows -->
  <path d="M520 247 C460 270 372 272 300 292" fill="none" stroke="url(#cyan)" stroke-width="5" stroke-linecap="round"/>
  <path d="M680 247 C740 270 828 272 900 292" fill="none" stroke="url(#purple)" stroke-width="5" stroke-linecap="round"/>

  <!-- superconducting card -->
  <g transform="translate(74 272)">
    <rect width="450" height="112" rx="20" fill="#052743" fill-opacity="0.88" stroke="#38ddff" stroke-width="2"/>
    <text x="225" y="25" text-anchor="middle" fill="#7cecff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">SUPERCONDUCTING-STYLE PROXY</text>
    <text x="225" y="46" text-anchor="middle" fill="#d8f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Line connectivity · routing detours may add SWAPs</text>
    <g transform="translate(61 70)" stroke="#4ce8ff" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="0" x2="82" y2="0"/><line x1="82" y1="0" x2="164" y2="0"/><line x1="164" y1="0" x2="246" y2="0"/><line x1="246" y1="0" x2="328" y2="0"/>
    </g>
    <g transform="translate(61 70)" fill="#07192e" stroke="#75f0ff" stroke-width="3">
      <circle r="13"/><circle cx="82" r="13"/><circle cx="164" r="13"/><circle cx="246" r="13"/><circle cx="328" r="13"/>
    </g>
    <g transform="translate(61 70)" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" text-anchor="middle" dominant-baseline="middle">
      <text>q0</text><text x="82">q1</text><text x="164">q2</text><text x="246">q3</text><text x="328">q4</text>
    </g>
  </g>

  <!-- trapped ion card -->
  <g transform="translate(676 272)">
    <rect width="450" height="112" rx="20" fill="#311944" fill-opacity="0.9" stroke="#e08aff" stroke-width="2"/>
    <text x="225" y="25" text-anchor="middle" fill="#f0b2ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="800">TRAPPED-ION-STYLE PROXY</text>
    <text x="225" y="46" text-anchor="middle" fill="#ffe4fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">All-to-all connectivity · direct interactions in this suite</text>
    <g transform="translate(225 79)" stroke="#ef9aff" stroke-opacity="0.72" stroke-width="2">
      <line x1="-130" y1="0" x2="-65" y2="-22"/><line x1="-130" y1="0" x2="0" y2="0"/><line x1="-130" y1="0" x2="65" y2="-22"/><line x1="-130" y1="0" x2="130" y2="0"/>
      <line x1="-65" y1="-22" x2="0" y2="0"/><line x1="-65" y1="-22" x2="65" y2="-22"/><line x1="-65" y1="-22" x2="130" y2="0"/>
      <line x1="0" y1="0" x2="65" y2="-22"/><line x1="0" y1="0" x2="130" y2="0"/><line x1="65" y1="-22" x2="130" y2="0"/>
    </g>
    <g transform="translate(225 79)" fill="#2a123d" stroke="#f2b0ff" stroke-width="3" filter="url(#glow)">
      <circle cx="-130" r="12"/><circle cx="-65" cy="-22" r="12"/><circle r="12"/><circle cx="65" cy="-22" r="12"/><circle cx="130" r="12"/>
    </g>
  </g>

  <text x="600" y="407" text-anchor="middle" fill="#9fb5e9" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Proxy comparisons, IBM physical-hardware evidence, and Quantinuum emulator evidence are labeled separately.</text>
</svg>
